<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - SEO Tools Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #fff;
            line-height: 1.6;
        }

        /* Navigation */
        .navbar {
            background: #1e293b;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #334155;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-menu a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #667eea;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-outline {
            padding: 0.5rem 1.5rem;
            border: 2px solid #667eea;
            border-radius: 8px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: #667eea;
            color: #fff;
        }

        .btn-primary {
            padding: 0.5rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        /* Hero Section */
        .about-hero {
            padding: 120px 2rem 4rem;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            text-align: center;
        }

        .about-hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .about-hero p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Stats Section */
        .stats-section {
            max-width: 1400px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .stat-box {
            background: #1e293b;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #334155;
            transition: all 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-10px);
            border-color: #667eea;
        }

        .stat-box i {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .stat-box h3 {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .stat-box p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Story Section */
        .story-section {
            max-width: 1400px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .story-content h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #fff;
        }

        .story-content h2 span {
            color: #667eea;
        }

        .story-content p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .story-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Team Section */
        .team-section {
            max-width: 1400px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .team-section h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .team-section h2 span {
            color: #667eea;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .team-member {
            background: #1e293b;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            border: 1px solid #334155;
            transition: all 0.3s;
        }

        .team-member:hover {
            transform: translateY(-10px);
            border-color: #667eea;
        }

        .member-img {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
        }

        .team-member h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .team-member p {
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .member-social {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .member-social a {
            color: #94a3b8;
            transition: color 0.3s;
        }

        .member-social a:hover {
            color: #667eea;
        }

        /* Values Section */
        .values-section {
            background: #1e293b;
            padding: 4rem 2rem;
            margin: 4rem 0;
        }

        .values-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .values-content h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .values-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .value-card {
            text-align: center;
        }

        .value-icon {
            width: 80px;
            height: 80px;
            background: #2d3748;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .value-icon i {
            font-size: 2rem;
            color: #667eea;
        }

        .value-card h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .value-card p {
            color: #94a3b8;
        }

        /* CTA Section */
        .cta-section {
            max-width: 1400px;
            margin: 4rem auto;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 40px;
            text-align: center;
        }

        .cta-section h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .cta-section p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .cta-btn {
            display: inline-block;
            padding: 1rem 3rem;
            background: #fff;
            color: #667eea;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Footer */
        .footer {
            background: #1e293b;
            color: #fff;
            padding: 4rem 2rem 2rem;
            margin-top: 4rem;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3rem;
        }

        .footer-section h3 {
            margin-bottom: 1.5rem;
            color: #667eea;
        }

        .footer-section p {
            color: #94a3b8;
            line-height: 1.8;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 0.8rem;
        }

        .footer-section ul li a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-section ul li a:hover {
            color: #667eea;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            background: #2d3748;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-links a:hover {
            background: #667eea;
            transform: translateY(-3px);
        }

        .footer-bottom {
            max-width: 1400px;
            margin: 3rem auto 0;
            padding-top: 2rem;
            border-top: 1px solid #334155;
            text-align: center;
            color: #94a3b8;
        }

        @media (max-width: 1024px) {
            .stats-section,
            .team-grid,
            .values-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .story-section {
                grid-template-columns: 1fr;
            }
            
            .footer-content {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stats-section,
            .team-grid,
            .values-grid,
            .footer-content {
                grid-template-columns: 1fr;
            }
            
            .about-hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

                <a href="login.html" class="btn-outline">Login</a>
                <a href="signup.html" class="btn-primary">Sign Up Free</a>
            </div>
        </div>
    </nav>

        <h1>Empowering Websites to Reach Their Full Potential</h1>
        <p>We're on a mission to make professional SEO tools accessible to everyone, from beginners to experts.</p>
