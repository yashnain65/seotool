<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dashboard - SEO Tools Pro</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            padding-top: 70px;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            position: fixed;
            height: calc(100vh - 70px);
            overflow-y: auto;
            transition: all 0.3s;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .user-details h4 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .user-details p {
            color: #666;
            font-size: 0.9rem;
        }

        .plan-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #f3f4f6;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #667eea;
            font-weight: 600;
        }

        .sidebar-nav {
            padding: 2rem 0;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 0.5rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            color: #666;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: #f8fafc;
            color: #667eea;
            border-left-color: #667eea;
        }

        .sidebar-nav a i {
            width: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #f8fafc;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 1.5rem;
            color: white;
        }

        /* Charts Section */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {

            padding: 1.5rem;

            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .chart-header h3 {

        }

        .chart-header select {
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            color: #666;
        }

        .chart-placeholder {
            height: 300px;
            background: #f8fafc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            border: 2px dashed #e2e8f0;
        }

        /* Recent Activity */

        }

        .activity-header {

            margin-bottom: 1.5rem;
        }

        .activity-header h3 {
            font-size: 1.1rem;
            color: #333;
        }

        .activity-list {
            list-style: none;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            background: #f3f4f6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
        }

        .activity-details {
            flex: 1;
        }

        .activity-details p {
            margin-bottom: 0.25rem;
            color: #333;
        }

        .activity-time {
            font-size: 0.85rem;
            color: #999;
        }

        .quick-actions {

        }

            border-radius: 12px;

            text-decoration: none;
            color: #333;
            transition: all 0.3s;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(99,102,241,0.1);
        }

        .action-card i {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .action-card h4 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .action-card p {
            font-size: 0.85rem;
            color: #666;
        }

            padding: 1.5rem;
            margin-top: 2rem;
        }
