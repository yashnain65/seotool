<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SEO Tools Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tumhara existing CSS yahan rahega */
        .auth-container { /* ... */ }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar"><!-- ... --></nav>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Welcome Back!</h2>
                <p>Login to access your SEO tools</p>
            </div>

            <!-- Error/Success Alerts -->
            <div class="alert error" id="errorAlert" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <div class="alert success" id="successAlert" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span></span>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up Free</a>
            </div>
        </div>
    </div>

    <!-- Simple JavaScript -->
    <script>
        // Password toggle function
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Login handler
        function handleLogin(event) {
            event.preventDefault();  // Form reload hone se rokta hai
            
            console.log('Login function called');
            
            // Get values
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Get alert elements
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            const loginBtn = document.getElementById('loginBtn');
            
            // Hide previous alerts
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            // Validation
            if (!email || !password) {
                errorAlert.querySelector('span').textContent = 'Please fill in all fields';
                errorAlert.style.display = 'flex';
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                errorAlert.querySelector('span').textContent = 'Please enter a valid email address';
                errorAlert.style.display = 'flex';
                return;
            }
            
            if (password.length < 6) {
                errorAlert.querySelector('span').textContent = 'Password must be at least 6 characters';
                errorAlert.style.display = 'flex';
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            // Simulate API call
            setTimeout(function() {
                // Demo credentials (for testing)
                if (email === 'demo@example.com' && password === 'password123') {
                    successAlert.querySelector('span').textContent = 'Login successful! Redirecting...';
                    successAlert.style.display = 'flex';
                    
                    // Redirect after 1 second
                    setTimeout(function() {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    errorAlert.querySelector('span').textContent = 'Invalid email or password';
                    errorAlert.style.display = 'flex';
                    
                    // Reset button
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            }, 1500);
        }
    </script>

    <!-- Test credentials: demo@example.com / password123 -->
</body>
</html>
