<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Audit - SEO Tools Pro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tool-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 120px 0 60px; text-align: center; }
        .tool-container { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
        .audit-progress {
            background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center; margin-bottom: 2rem;
        }
        .progress-circle { width: 150px; height: 150px; border: 10px solid #f0f0f0; border-top-color: #667eea; border-radius: 50%; margin: 1rem auto; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .issues-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
        .issue-tag { padding: 0.5rem 1rem; background: #f8fafc; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>[similar structure]</body>
</html>
